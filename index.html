<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Key</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a0a0a;
    font-family: Arial, sans-serif;
    color: #fff;
  }

  .card {
    background: #111;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
    border: 1px solid #333;
  }

  h2 {
    margin-bottom: 20px;
    color: #e8c96a;
  }

  input {
    width: 100%;
    padding: 10px;
    background: #0d0d0d;
    border: 1px solid #333;
    color: #e8c96a;
    margin-bottom: 15px;
    text-align: center;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #e8c96a;
    border: none;
    color: #000;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    opacity: 0.9;
  }

  .status {
    margin-top: 10px;
    font-size: 12px;
    color: #e8c96a;
    display: none;
  }
</style>
</head>
<body>

<div class="card">
  <h2>Your Key</h2>

  <input id="keyBox" value="Loading..." readonly>

  <button onclick="copyKey()">Copy</button>

  <div class="status" id="status">Copied!</div>
</div>

<script>
// 🔥 AUTO AMBIL KEY DARI key.txt
fetch("/key.txt")
  .then(res => res.text())
  .then(data => {
    document.getElementById("keyBox").value = data.trim();
  })
  .catch(() => {
    document.getElementById("keyBox").value = "ERROR LOAD KEY";
  });

function copyKey() {
  const box = document.getElementById("keyBox");
  const status = document.getElementById("status");

  box.select();
  document.execCommand("copy");

  status.style.display = "block";

  setTimeout(() => {
    status.style.display = "none";
  }, 2000);
}
</script>

</body>
</html>
