<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Key</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #080808;
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(232, 201, 106, 0.06) 0%, transparent 70%);
    pointer-events: none;
    animation: ambientPulse 4s ease-in-out infinite;
  }

  @keyframes ambientPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  .card {
    position: relative;
    background: linear-gradient(145deg, #141414, #0e0e0e);
    padding: 40px 36px;
    border-radius: 16px;
    width: 340px;
    text-align: center;
    border: 1px solid rgba(232, 201, 106, 0.15);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    animation: cardReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Corner accents */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: rgba(232, 201, 106, 0.5);
    border-style: solid;
  }
  .card::before {
    top: 10px; left: 10px;
    border-width: 1px 0 0 1px;
  }
  .card::after {
    bottom: 10px; right: 10px;
    border-width: 0 1px 1px 0;
  }

  .card-inner::before, .card-inner::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: rgba(232, 201, 106, 0.5);
    border-style: solid;
  }
  .card-inner::before {
    top: 10px; right: 10px;
    border-width: 1px 1px 0 0;
  }
  .card-inner::after {
    bottom: 10px; left: 10px;
    border-width: 0 0 1px 1px;
  }

  .icon {
    font-size: 28px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 12px rgba(232, 201, 106, 0.6));
    animation: iconFloat 3s ease-in-out infinite;
  }

  @keyframes iconFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  h2 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e8c96a;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(232, 201, 106, 0.4);
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232, 201, 106, 0.3), transparent);
    margin-bottom: 28px;
  }

  /* === SHINE TEXTBOX === */
  .input-wrapper {
    position: relative;
    margin-bottom: 16px;
    border-radius: 8px;
    overflow: hidden;
  }

  /* Shine sweep animation */
  .input-wrapper::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      105deg,
      transparent 20%,
      rgba(232, 201, 106, 0.15) 40%,
      rgba(255, 240, 180, 0.35) 50%,
      rgba(232, 201, 106, 0.15) 60%,
      transparent 80%
    );
    animation: shineSweep 2.8s ease-in-out infinite;
    pointer-events: none;
    z-index: 2;
  }

  @keyframes shineSweep {
    0%   { left: -100%; opacity: 0; }
    10%  { opacity: 1; }
    60%  { left: 160%; opacity: 1; }
    61%  { opacity: 0; }
    100% { left: 160%; opacity: 0; }
  }

  /* Glowing border */
  .input-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    padding: 1px;
    background: linear-gradient(135deg,
      rgba(232, 201, 106, 0.6),
      rgba(232, 201, 106, 0.1),
      rgba(255, 220, 100, 0.6)
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    z-index: 1;
    animation: borderGlow 2.8s ease-in-out infinite;
  }

  @keyframes borderGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; box-shadow: 0 0 12px rgba(232, 201, 106, 0.3); }
  }

  input {
    width: 100%;
    padding: 13px 16px;
    background: linear-gradient(135deg, #0d0d0d, #111);
    border: none;
    border-radius: 8px;
    color: #e8c96a;
    font-family: 'Rajdhani', monospace;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-align: center;
    outline: none;
    position: relative;
    z-index: 0;
    text-shadow: 0 0 10px rgba(232, 201, 106, 0.4);
    cursor: default;
  }

  input::selection {
    background: rgba(232, 201, 106, 0.25);
  }

  /* Button */
  button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #c9a83a, #e8c96a, #c9a83a);
    background-size: 200% 100%;
    border: none;
    border-radius: 8px;
    color: #0a0a0a;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(232, 201, 106, 0.2);
  }

  button::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.4s ease;
  }

  button:hover {
    background-position: 100% 0;
    box-shadow: 0 6px 28px rgba(232, 201, 106, 0.4);
    transform: translateY(-1px);
  }

  button:hover::before {
    left: 150%;
  }

  button:active {
    transform: translateY(0);
    box-shadow: 0 2px 12px rgba(232, 201, 106, 0.3);
  }

  /* Status badge */
  .status {
    display: none;
    margin-top: 14px;
    padding: 8px 16px;
    background: rgba(232, 201, 106, 0.08);
    border: 1px solid rgba(232, 201, 106, 0.25);
    border-radius: 6px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #e8c96a;
    text-transform: uppercase;
    animation: fadeInUp 0.2s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status.show {
    display: block;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(232, 201, 106, 0.4);
    border-radius: 50%;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-20px) scale(1); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

<div class="card">
  <div class="card-inner">
    <div class="icon">🗝️</div>
    <h2>Your Key</h2>
    <p class="subtitle">Access Token</p>
    <div class="divider"></div>

    <div class="input-wrapper">
      <input id="keyBox" value="Loading..." readonly>
    </div>

    <button onclick="copyKey()">⬡ Copy Key</button>

    <div class="status" id="status">✦ Copied to Clipboard</div>
  </div>
</div>

<script>
  // Generate particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    p.style.opacity = Math.random() * 0.6;
    container.appendChild(p);
  }

  // Load key
  fetch("/key.txt")
    .then(res => res.text())
    .then(data => {
      document.getElementById("keyBox").value = data.trim();
    })
    .catch(() => {
      document.getElementById("keyBox").value = "ERROR LOAD KEY";
    });

  function copyKey() {
    const box = document.getElementById("keyBox");
    const status = document.getElementById("status");

    box.select();
    document.execCommand("copy");

    status.classList.add("show");
    setTimeout(() => {
      status.classList.remove("show");
    }, 2000);
  }
</script>

</body>
      </html>
